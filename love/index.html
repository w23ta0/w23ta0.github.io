<script type="text/javascript">
var msg, offsetX = $("#loveHeart").width() / 2,
    offsetY = $("#loveHeart").height() / 2 - 55,
    displayMode = 1,
    together = new Date(2013, 0, 12), // 直接初始化日期
    updateTime = function() {
        var now = new Date(); // 当前时间
        var timeDifference = now - together; // 计算毫秒差

        // 计算各个单位的时间
        var seconds = Math.floor(timeDifference / 1000);
        var minutes = Math.floor(seconds / 60);
        var hours = Math.floor(minutes / 60);
        var days = Math.floor(hours / 24);
        var months = Math.floor(days / 30.4375); // 平均天数每月（考虑到闰年）
        var years = Math.floor(months / 12); // 计算年份

        // 计算剩余的时间单位
        var remainingMonths = months % 12;
        var remainingDays = days % 30;
        var remainingHours = hours % 24;
        var remainingMinutes = minutes % 60;
        var remainingSeconds = seconds % 60;

        // 更新显示
        document.getElementById('elapseClock').innerHTML = `
            <span class="digit">
                <h3>${years}</h3> years
            </span>
            <span class="digit">
                <h3>${remainingMonths}</h3> months
            </span>
            <span class="digit">
                <h3>${remainingDays}</h3> days
            </span>
            <span class="digit">
                <h3>${remainingHours.toString().padStart(2, '0')}</h3> hours
            </span>
            <span class="digit">
                <h3>${remainingMinutes.toString().padStart(2, '0')}</h3> minutes
            </span>
            <span class="digit">
                <h3>${remainingSeconds.toString().padStart(2, '0')}</h3> seconds
            </span>
        `;
    };

    // 页面加载时执行一次时间差计算
    updateTime();

    // 每500毫秒更新一次
    setInterval(updateTime, 500);

</script>
